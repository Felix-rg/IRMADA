<script>
document.addEventListener("DOMContentLoaded", function(){

/* =====================
   TANGGAL OTOMATIS
===================== */

let now = new Date();
let year = now.getFullYear();
let month = String(now.getMonth() + 1).padStart(2,'0');
let day = String(now.getDate()).padStart(2,'0');

let today = year + "-" + month + "-" + day;

let tanggal = document.getElementById("tanggal");
if(tanggal){
tanggal.value = today;
}

/* =====================
   AUTO FOCUS NAMA
===================== */

let nama = document.getElementById("nama");
if(nama){
nama.focus();
}

/* =====================
   TOAST SUCCESS
===================== */

const urlParams = new URLSearchParams(window.location.search);

if(urlParams.get('success') === '1'){

let toastElement = document.getElementById("successToast");

let toast = new bootstrap.Toast(toastElement,{
delay:3000
});

toast.show();

window.history.replaceState({}, document.title, window.location.pathname);

}

/* =====================
   ALAMAT SELECT
===================== */

const alamatSelect = document.getElementById("alamatSelect");
const manualAlamat = document.getElementById("manualAlamat");

if(alamatSelect){

alamatSelect.addEventListener("change", function(){

if(alamatSelect.value === "lainnya"){
manualAlamat.style.display = "block";
}else{
manualAlamat.style.display = "none";
}

});

}

/* =====================
   NOMINAL SELECT
===================== */

const nominalSelect = document.getElementById("nominalSelect");
const manualNominal = document.getElementById("manualNominal");
const manualInput = document.querySelector("input[name='nominal']");

if(nominalSelect){

nominalSelect.addEventListener("change", function(){

if(nominalSelect.value === "lainnya"){

manualNominal.style.display = "block";
manualInput.focus();

}else{

manualNominal.style.display = "none";
manualInput.value = nominalSelect.value;

}

});

}

});

</script>
</head>
